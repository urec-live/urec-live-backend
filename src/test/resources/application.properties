spring.application.name=URECLiveBackendToTest

# H2 Database Configuration for Testing
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# JWT Configuration
jwt.secret=test_jwt_secret_key_which_is_long_enough_for_security_tests_and_should_be_at_least_256_bits
jwt.expiration=86400000
jwt.refreshExpiration=604800000

# Password reset configuration
app.password-reset.base-url=http://localhost:8081/reset-password
app.password-reset.expiry-minutes=30

# Email (SMTP) configuration (no-op or mocked in tests usually, but providing values so context loads)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
app.mail.from=test@urec.live

# Other
session.timeout.minutes=4
session.timeout.warning-minutes=2
session.timeout.check-ms=5000
analytics.wait-time.min-history=5
expo.push.enabled=false
expo.push.url=http://localhost
