spring.application.name=URECLiveBackend

# PostgreSQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}

# Server Configuration
server.address=0.0.0.0
server.port=${PORT:8080}

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refreshExpiration=${JWT_REFRESH_EXPIRATION:604800000}

spring.output.ansi.enabled=ALWAYS

# CV secondary source integration (urec-live-cv)
app.cv.secondary.enabled=${APP_CV_SECONDARY_ENABLED:false}
app.cv.secondary.base-url=${APP_CV_SECONDARY_BASE_URL:http://localhost:8000}
app.cv.secondary.confidence-threshold=${APP_CV_SECONDARY_CONFIDENCE_THRESHOLD:0.65}
app.cv.secondary.cache-ttl-ms=${APP_CV_SECONDARY_CACHE_TTL_MS:3000}
