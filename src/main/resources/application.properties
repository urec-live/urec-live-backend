spring.application.name=URECLiveBackend

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://ep-twilight-surf-adiwldgq-pooler.c-2.us-east-1.aws.neon.tech/neondb?sslmode=require&user=neondb_owner&password=npg_c5gRp7fMXlWF
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=neondb_owner
spring.datasource.password=npg_c5gRp7fMXlWF
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# Server Configuration
server.address=0.0.0.0
server.port=8080

# JWT Configuration
jwt.secret=your_super_secret_jwt_key_that_should_be_at_least_256_bits_long_for_security_purposes_in_production
jwt.expiration=86400000
jwt.refreshExpiration=604800000

# Password reset configuration
app.password-reset.base-url=${APP_PASSWORD_RESET_BASE_URL:http://localhost:8081/reset-password}
app.password-reset.expiry-minutes=${APP_PASSWORD_RESET_EXPIRY_MINUTES:30}

# Email (SMTP) configuration
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
app.mail.from=${MAIL_FROM:}

# Session timeout (auto-end stale sessions)
session.timeout.minutes=4
session.timeout.warning-minutes=2
session.timeout.check-ms=5000

# Wait-time estimation
analytics.wait-time.min-history=5

# Expo push notifications
expo.push.enabled=true
expo.push.url=https://exp.host/--/api/v2/push/send
